<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — AlpeStyle 74</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fafaf8;--text:#1a1a18;--text2:#6b6b66;--border:rgba(0,0,0,0.12);--accent:#1a1a18}
body{font-family:'Montserrat',sans-serif;font-weight:300;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
.logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:4px;text-transform:uppercase;margin-bottom:3rem;opacity:.5}
.logo span{font-weight:300}
.num{font-family:'Cormorant Garamond',serif;font-size:120px;font-weight:300;letter-spacing:8px;line-height:1;color:var(--text);opacity:.08}
.title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:4px;text-transform:uppercase;margin-top:-1.5rem;margin-bottom:.75rem}
.sub{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:2.5rem;line-height:1.8}
.btn{display:inline-block;font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;padding:12px 28px;border:0.5px solid var(--accent);background:var(--accent);color:#fff;text-decoration:none;border-radius:2px;transition:opacity .2s}
.btn:hover{opacity:.82}
.divider{width:40px;height:0.5px;background:var(--border);margin:2rem auto}
</style>
</head>
<body>
  <div class="logo">Alpe<span>Style</span> 74</div>
  <div class="num">404</div>
  <div class="title">Page introuvable</div>
  <div class="sub">Cette page n'existe pas ou a été déplacée.<br>Retournez à la boutique.</div>
  <a href="/" class="btn">Retour à la boutique</a>
  <div class="divider"></div>
</body>
</html>
